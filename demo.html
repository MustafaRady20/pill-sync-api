<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        .google-btn {
            background: #4285f4;
            color: white;
            border: none;
        }
        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        .section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>NestJS Auth Demo</h1>

    <div class="section">
        <h2>Register</h2>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="registerEmail" value="test@example.com">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="registerPassword" value="password123">
        </div>
        <div class="form-group">
            <label>First Name:</label>
            <input type="text" id="registerFirstName" value="John">
        </div>
        <div class="form-group">
            <label>Last Name:</label>
            <input type="text" id="registerLastName" value="Doe">
        </div>
        <button onclick="register()">Register</button>
    </div>

    <div class="section">
        <h2>Login</h2>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="loginEmail" value="test@example.com">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="loginPassword" value="password123">
        </div>
        <button onclick="login()">Login</button>
        <button class="google-btn" onclick="loginWithGoogle()">Login with Google</button>
    </div>

    <div class="section">
        <h2>Get Profile (Protected)</h2>
        <button onclick="getProfile()">Get Profile</button>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="output" id="output">Response will appear here...</div>

    <script>
        const API_URL = 'http://localhost:3000';
        
        function showOutput(data) {
            document.getElementById('output').textContent = JSON.stringify(data, null, 2);
        }

        async function register() {
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: document.getElementById('registerEmail').value,
                        password: document.getElementById('registerPassword').value,
                        firstName: document.getElementById('registerFirstName').value,
                        lastName: document.getElementById('registerLastName').value,
                    }),
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    showOutput({ success: true, ...data });
                } else {
                    showOutput({ error: data });
                }
            } catch (error) {
                showOutput({ error: error.message });
            }
        }

        async function login() {
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value,
                    }),
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    showOutput({ success: true, ...data });
                } else {
                    showOutput({ error: data });
                }
            } catch (error) {
                showOutput({ error: error.message });
            }
        }

        function loginWithGoogle() {
            window.location.href = `${API_URL}/auth/google`;
        }

        async function getProfile() {
            const token = localStorage.getItem('token');
            
            if (!token) {
                showOutput({ error: 'No token found. Please login first.' });
                return;
            }

            try {
                const response = await fetch(`${API_URL}/user/profile`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                });

                const data = await response.json();
                showOutput(data);
            } catch (error) {
                showOutput({ error: error.message });
            }
        }

        function logout() {
            localStorage.removeItem('token');
            showOutput({ message: 'Logged out successfully' });
        }

        // Handle Google OAuth callback
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (token) {
                localStorage.setItem('token', token);
                showOutput({ message: 'Google login successful!', token });
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };
    </script>
</body>
</html>
